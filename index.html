<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Starting Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .minecraft-font { font-family: 'Press Start 2P', system-ui; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100">

    <!-- Navbar -->
    <nav class="bg-neutral-900 border-b-4 border-emerald-500 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-4xl">⛏️</span>
                <h1 class="text-3xl font-bold tracking-widest text-emerald-400 minecraft-font">MINECRAFT</h1>
                <span class="text-xl">Starting Guide</span>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="bg-gradient-to-br from-neutral-950 via-emerald-950 to-neutral-950 py-20 text-center">
        <h1 class="text-6xl font-black mb-4">Welcome to Minecraft!</h1>
        <p class="text-2xl text-emerald-300">Share your tips with other players</p>
    </section>

    <!-- Live Comments / Tips Section -->
    <section class="max-w-6xl mx-auto px-6 py-16">
        <h2 class="text-4xl font-bold text-center mb-10 text-emerald-400">Community Tips & Comments</h2>
        <div id="comments-container" class="space-y-6 mb-12">
            <!-- Comments will load here automatically -->
        </div>

        <!-- Add New Comment Form -->
        <div class="bg-neutral-900 rounded-3xl p-10 max-w-2xl mx-auto">
            <h3 class="text-2xl font-bold mb-6">Write Your Tip / Comment</h3>
            <form id="comment-form" class="space-y-6">
                <input type="text" id="name" placeholder="Your Name (optional)" 
                       class="w-full bg-neutral-800 border border-neutral-600 rounded-2xl px-6 py-4 text-lg">
                
                <textarea id="message" rows="4" placeholder="Example: Never dig straight down! Always carry torches..." 
                          class="w-full bg-neutral-800 border border-neutral-600 rounded-3xl px-6 py-4 text-lg"></textarea>
                
                <button type="submit" 
                        class="w-full bg-emerald-500 hover:bg-emerald-600 py-5 rounded-3xl font-bold text-xl">
                    Submit Comment
                </button>
            </form>
            <p id="status" class="text-center mt-6 text-emerald-400"></p>
        </div>
    </section>

    <script>
        const BACKEND_URL = 'https://YOUR-RENDER-URL.onrender.com';   // ← CHANGE THIS

        // Load all comments
        async function loadComments() {
            const container = document.getElementById('comments-container');
            container.innerHTML = '<p class="text-center text-neutral-400">Loading comments...</p>';

            try {
                const res = await fetch(`${BACKEND_URL}/api/comments`);
                const comments = await res.json();

                if (comments.length === 0) {
                    container.innerHTML = '<p class="text-center text-amber-400">No comments yet. Be the first!</p>';
                    return;
                }

                let html = '';
                comments.forEach(c => {
                    html += `
                        <div class="bg-neutral-800 rounded-3xl p-8">
                            <div class="flex justify-between">
                                <strong class="text-emerald-400">${c.name || 'Anonymous'}</strong>
                                <small class="text-neutral-500">${new Date(c.timestamp).toLocaleString()}</small>
                            </div>
                            <p class="mt-3 text-lg">${c.message}</p>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch(e) {
                container.innerHTML = '<p class="text-red-400 text-center">Could not load comments</p>';
            }
        }

        // Submit new comment
        document.getElementById('comment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const message = document.getElementById('message').value.trim();
            const status = document.getElementById('status');

            if (!message) {
                status.textContent = "Please write a comment!";
                status.className = "text-red-400";
                return;
            }

            status.textContent = "Saving to database...";

            try {
                const res = await fetch(`${BACKEND_URL}/api/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name || 'Anonymous', message })
                });

                if (res.ok) {
                    status.textContent = "✅ Comment saved successfully!";
                    document.getElementById('comment-form').reset();
                    loadComments();        // Refresh the list
                } else {
                    status.textContent = "Failed to save. Try again.";
                }
            } catch(e) {
                status.textContent = "Cannot connect to server.";
            }
        });

        // Load comments when page opens
        window.onload = loadComments;
    </script>
</body>
</html>
