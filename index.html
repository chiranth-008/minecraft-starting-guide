<script>
  const BACKEND_URL = 'https://your-backend.onrender.com'; // ← CHANGE TO YOUR RENDER URL

  async function loadDynamicSections() {
    try {
      const res = await fetch(`${BACKEND_URL}/api/sections`);
      const sections = await res.json();
      
      // Example: populate a new "Dynamic Tips" section
      console.log('Loaded from Firebase:', sections);
      // You can now render them dynamically — let me know if you want the full updated HTML
    } catch(e) {
      console.error('Backend not reachable yet');
    }
  }

  // Load on page start
  window.onload = loadDynamicSections;
</script>
